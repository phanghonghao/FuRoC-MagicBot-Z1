<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <!-- Done gradient -->
    <linearGradient id="doneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- In Progress gradient -->
    <linearGradient id="progressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Planned gradient -->
    <linearGradient id="plannedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">5-Phase Curriculum Learning Pipeline</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Each phase resumes from the best checkpoint of the previous phase</text>

  <!-- Terrain labels row -->
  <g font-size="10" fill="#64748b" font-weight="500">
    <text x="140" y="85" text-anchor="middle">FLAT</text>
    <text x="420" y="85" text-anchor="middle">GENTLE</text>
    <text x="660" y="85" text-anchor="middle">INTERMEDIATE</text>
    <text x="820" y="85" text-anchor="middle">ROUGH</text>
  </g>

  <!-- P1 Row -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="105" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="white">P1 Coarse</text>
    <text x="105" y="142" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Standing</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="100" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="265" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="white">P1 Fine</text>
    <text x="265" y="142" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Standing</text>
  </g>

  <!-- P2 Row -->
  <g filter="url(#shadow)">
    <rect x="40" y="186" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="105" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="white">P2 Coarse</text>
    <text x="105" y="228" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Velocity Track</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="186" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="265" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="white">P2 Fine</text>
    <text x="265" y="228" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Velocity Track</text>
  </g>

  <!-- P3 Row -->
  <g filter="url(#shadow)">
    <rect x="360" y="100" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="425" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="white">P3 Coarse</text>
    <text x="425" y="142" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Light Terrain</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="100" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="585" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="white">P3 Fine</text>
    <text x="585" y="142" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Light Terrain</text>
  </g>

  <!-- P3b Row -->
  <g filter="url(#shadow)">
    <rect x="360" y="186" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="425" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="white">P3b Coarse</text>
    <text x="425" y="228" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Terrain Mix</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="186" width="130" height="56" rx="8" fill="url(#doneGrad)"/>
    <text x="585" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="white">P3b Fine</text>
    <text x="585" y="228" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Terrain Mix</text>
  </g>

  <!-- P4 Row -->
  <g filter="url(#shadow)">
    <rect x="730" y="100" width="130" height="56" rx="8" fill="url(#progressGrad)"/>
    <text x="795" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="white">P4 Coarse</text>
    <text x="795" y="142" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Rough Terrain</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="730" y="186" width="130" height="56" rx="8" fill="url(#progressGrad)"/>
    <text x="795" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="white">P4 Fine</text>
    <text x="795" y="228" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Rough Terrain</text>
  </g>

  <!-- P5 Row (below) -->
  <g filter="url(#shadow)">
    <rect x="730" y="310" width="130" height="56" rx="8" fill="url(#plannedGrad)"/>
    <text x="795" y="334" text-anchor="middle" font-size="13" font-weight="700" fill="white">P5 Coarse</text>
    <text x="795" y="352" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Full Terrain</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="730" y="396" width="130" height="56" rx="8" fill="url(#plannedGrad)"/>
    <text x="795" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="white">P5 Fine</text>
    <text x="795" y="438" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Full Terrain</text>
  </g>

  <!-- Arrows: P1 Coarse → P1 Fine -->
  <line x1="170" y1="128" x2="200" y2="128" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P1 Fine → P2 Coarse -->
  <line x1="265" y1="156" x2="265" y2="175" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Adjust: P2 Coarse is at x=40, not x=265. Arrow from P1 Fine (265,156) down-left to P2 Coarse (105,186) -->
  <line x1="265" y1="156" x2="115" y2="186" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>

  <!-- P2 Coarse → P2 Fine -->
  <line x1="170" y1="214" x2="200" y2="214" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P2 Fine → P3 Coarse -->
  <line x1="330" y1="214" x2="360" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <!-- P3 Coarse → P3 Fine -->
  <line x1="490" y1="128" x2="520" y2="128" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P3 Fine → P3b Coarse -->
  <line x1="585" y1="156" x2="425" y2="186" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <!-- P3b Coarse → P3b Fine -->
  <line x1="490" y1="214" x2="520" y2="214" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P3b Fine → P4 Coarse -->
  <line x1="650" y1="214" x2="730" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <!-- P4 Coarse → P4 Fine -->
  <line x1="795" y1="156" x2="795" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P4 Fine → P5 Coarse -->
  <line x1="795" y1="242" x2="795" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
  <!-- P5 Coarse → P5 Fine -->
  <line x1="795" y1="366" x2="795" y2="396" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Terrain info box (left side) -->
  <rect x="40" y="310" width="280" height="142" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="334" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Terrain Composition</text>
  <line x1="60" y1="342" x2="300" y2="342" stroke="#e2e8f0"/>
  <g font-size="11" fill="#475569">
    <text x="60" y="360"><tspan font-weight="600" fill="#1e293b">P1-P2:</tspan> 100% Flat</text>
    <text x="60" y="380"><tspan font-weight="600" fill="#1e293b">P3:</tspan> 70% Flat + 30% Gentle Grid</text>
    <text x="60" y="400"><tspan font-weight="600" fill="#1e293b">P3b:</tspan> 50% Flat + 30% Grid + 10% Stairs + 10% Boxes</text>
    <text x="60" y="420"><tspan font-weight="600" fill="#1e293b">P4:</tspan> Flat + Grid + Stairs + Gap + Boxes</text>
    <text x="60" y="440"><tspan font-weight="600" fill="#1e293b">P5:</tspan> Full Terrain + Rails + High Speed</text>
  </g>

  <!-- Legend -->
  <rect x="380" y="310" width="200" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="334" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Legend</text>
  <line x1="400" y1="342" x2="560" y2="342" stroke="#e2e8f0"/>
  <rect x="400" y="352" width="16" height="16" rx="3" fill="url(#doneGrad)"/>
  <text x="424" y="365" font-size="11" fill="#475569">Done</text>
  <rect x="400" y="376" width="16" height="16" rx="3" fill="url(#progressGrad)"/>
  <text x="424" y="389" font-size="11" fill="#475569">In Progress</text>
  <rect x="400" y="400" width="16" height="16" rx="3" fill="url(#plannedGrad)"/>
  <text x="424" y="413" font-size="11" fill="#475569">Planned</text>
  <line x1="490" y1="360" x2="520" y2="360" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="528" y="365" font-size="11" fill="#475569">Resume</text>
  <line x1="490" y1="384" x2="520" y2="384" stroke="#94a3b8" stroke-width="2"/>
  <text x="528" y="389" font-size="11" fill="#475569">Fine-tune</text>

  <!-- Hardware badge -->
  <rect x="620" y="396" width="240" height="56" rx="8" fill="#0f172a"/>
  <text x="740" y="418" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">TRAINING</text>
  <text x="740" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="white">4 × RTX 6000D · 16K envs · ~330K steps/s</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="doneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="retrainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="plannedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">5-Phase Curriculum Learning Pipeline</text>
  <text x="410" y="52" text-anchor="middle" font-size="11" fill="#64748b">Each phase resumes from the best checkpoint of the previous phase</text>

  <!-- Legend -->
  <g transform="translate(490, 66)">
    <rect width="310" height="28" rx="6" fill="white" stroke="#e2e8f0"/>
    <rect x="10" y="7" width="14" height="14" rx="3" fill="url(#doneGrad)"/>
    <text x="30" y="18" font-size="10" fill="#475569">Done</text>
    <rect x="75" y="7" width="14" height="14" rx="3" fill="url(#retrainGrad)"/>
    <text x="95" y="18" font-size="10" fill="#475569">Retraining</text>
    <rect x="170" y="7" width="14" height="14" rx="3" fill="url(#plannedGrad)"/>
    <text x="190" y="18" font-size="10" fill="#475569">Planned</text>
    <line x1="245" y1="14" x2="270" y2="14" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="276" y="18" font-size="10" fill="#475569">Resume</text>
  </g>

  <!-- ============ P1 Row (y=100) ============ -->
  <!-- Phase label -->
  <text x="50" y="120" font-size="12" font-weight="700" fill="#1e293b">P1</text>
  <text x="50" y="134" font-size="9" fill="#64748b">Flat · Bootstrap</text>
  <!-- P1 Coarse -->
  <g filter="url(#shadow)">
    <rect x="130" y="100" width="155" height="48" rx="8" fill="url(#doneGrad)"/>
    <text x="207" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="white">P1 Coarse</text>
    <text x="207" y="138" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Standing</text>
  </g>
  <!-- Arrow P1_C → P1_F -->
  <line x1="285" y1="124" x2="320" y2="124" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P1 Fine -->
  <g filter="url(#shadow)">
    <rect x="325" y="100" width="155" height="48" rx="8" fill="url(#doneGrad)"/>
    <text x="402" y="122" text-anchor="middle" font-size="13" font-weight="700" fill="white">P1 Fine</text>
    <text x="402" y="138" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Standing</text>
  </g>
  <!-- Terrain badge -->
  <rect x="510" y="108" width="70" height="22" rx="11" fill="#dcfce7" stroke="#86efac"/>
  <text x="545" y="123" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">FLAT</text>
  <!-- Done check -->
  <text x="600" y="126" font-size="14" fill="#22c55e">&#10003;</text>

  <!-- Resume arrow P1_F → P2_C -->
  <path d="M 402 148 L 402 165 Q 402 175 392 175 L 218 175 Q 207 175 207 185 L 207 195" stroke="#22c55e" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- ============ P2 Row (y=195) ============ -->
  <text x="50" y="215" font-size="12" font-weight="700" fill="#1e293b">P2</text>
  <text x="50" y="229" font-size="9" fill="#64748b">Flat · Velocity</text>
  <!-- P2 Coarse -->
  <g filter="url(#shadow)">
    <rect x="130" y="195" width="155" height="48" rx="8" fill="url(#doneGrad)"/>
    <text x="207" y="217" text-anchor="middle" font-size="13" font-weight="700" fill="white">P2 Coarse</text>
    <text x="207" y="233" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Velocity Track</text>
  </g>
  <!-- Arrow P2_C → P2_F -->
  <line x1="285" y1="219" x2="320" y2="219" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P2 Fine (RETRAINING) -->
  <g filter="url(#shadow)">
    <rect x="325" y="195" width="155" height="48" rx="8" fill="url(#retrainGrad)"/>
    <text x="402" y="217" text-anchor="middle" font-size="13" font-weight="700" fill="white">P2 Fine</text>
    <text x="402" y="233" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Retraining...</text>
  </g>
  <!-- Retraining annotation -->
  <rect x="498" y="195" width="140" height="22" rx="4" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="568" y="210" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">+ joint_mirror reward</text>
  <text x="568" y="220" text-anchor="middle" font-size="7" fill="#a16207">fix left-right asymmetry</text>

  <!-- Resume arrow P2_F → P3_C (planned, dashed gray) -->
  <path d="M 402 243 L 402 260 Q 402 270 392 270 L 218 270 Q 207 270 207 280 L 207 290" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ============ P3 Row (y=290) ============ -->
  <text x="50" y="310" font-size="12" font-weight="700" fill="#94a3b8">P3</text>
  <text x="50" y="324" font-size="9" fill="#94a3b8">Gentle Terrain</text>
  <!-- P3 Coarse -->
  <g filter="url(#shadow)">
    <rect x="130" y="290" width="155" height="48" rx="8" fill="url(#plannedGrad)"/>
    <text x="207" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="white">P3 Coarse</text>
    <text x="207" y="328" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Light Terrain</text>
  </g>
  <line x1="285" y1="314" x2="320" y2="314" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- P3 Fine -->
  <g filter="url(#shadow)">
    <rect x="325" y="290" width="155" height="48" rx="8" fill="url(#plannedGrad)"/>
    <text x="402" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="white">P3 Fine</text>
    <text x="402" y="328" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Light Terrain</text>
  </g>
  <rect x="510" y="298" width="100" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="560" y="313" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">70/30 Grid</text>

  <!-- Resume arrow P3_F → P4_C -->
  <path d="M 402 338 L 402 355 Q 402 365 392 365 L 218 365 Q 207 365 207 375 L 207 385" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ============ P4 Row (y=385) ============ -->
  <text x="50" y="405" font-size="12" font-weight="700" fill="#94a3b8">P4</text>
  <text x="50" y="419" font-size="9" fill="#94a3b8">Rough Terrain</text>
  <g filter="url(#shadow)">
    <rect x="130" y="385" width="155" height="48" rx="8" fill="url(#plannedGrad)"/>
    <text x="207" y="407" text-anchor="middle" font-size="13" font-weight="700" fill="white">P4 Coarse</text>
    <text x="207" y="423" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Rough Terrain</text>
  </g>
  <line x1="285" y1="409" x2="320" y2="409" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="325" y="385" width="155" height="48" rx="8" fill="url(#plannedGrad)"/>
    <text x="402" y="407" text-anchor="middle" font-size="13" font-weight="700" fill="white">P4 Fine</text>
    <text x="402" y="423" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Rough Terrain</text>
  </g>
  <rect x="510" y="393" width="120" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="570" y="408" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">Full Mix Terrain</text>

  <!-- Resume arrow P4_F → P5_C -->
  <path d="M 402 433 L 402 450 Q 402 460 392 460 L 218 460 Q 207 460 207 470 L 207 480" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ============ P5 Row (y=480) ============ -->
  <text x="50" y="500" font-size="12" font-weight="700" fill="#94a3b8">P5</text>
  <text x="50" y="514" font-size="9" fill="#94a3b8">Full + Polish</text>
  <g filter="url(#shadow)">
    <rect x="130" y="480" width="155" height="48" rx="8" fill="url(#plannedGrad)"/>
    <text x="207" y="502" text-anchor="middle" font-size="13" font-weight="700" fill="white">P5 Coarse</text>
    <text x="207" y="518" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Full Terrain</text>
  </g>
  <line x1="285" y1="504" x2="320" y2="504" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="325" y="480" width="155" height="48" rx="8" fill="url(#plannedGrad)"/>
    <text x="402" y="502" text-anchor="middle" font-size="13" font-weight="700" fill="white">P5 Fine</text>
    <text x="402" y="518" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Full Terrain</text>
  </g>
  <rect x="510" y="488" width="110" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="565" y="503" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">+ Rails + Speed</text>

  <!-- Hardware badge (bottom right) -->
  <rect x="640" y="430" width="170" height="48" rx="8" fill="#0f172a"/>
  <text x="725" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">TRAINING</text>
  <text x="725" y="467" text-anchor="middle" font-size="12" font-weight="700" fill="white">4×RTX 6000D · 16K envs</text>
</svg>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase Orchestrator — Post-Phase Video Pipeline</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #ffffff;
    color: #24292f;
    margin: 0; padding: 24px;
    display: flex; flex-direction: column; align-items: center;
  }
  h1 { color: #0969da; font-size: 22px; margin-bottom: 4px; }
  h2 { color: #656d76; font-size: 14px; font-weight: normal; margin-top: 0; }
  svg { max-width: 1100px; width: 100%; }
  .legend {
    margin-top: 16px; font-size: 13px; color: #656d76;
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
</style>
</head>
<body>

<h1>Phase Orchestrator — 后台视频录制 Pipeline</h1>
<h2>_run_post_phase_pipeline() · 每个子阶段训练完成后自动触发</h2>

<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1100" height="820" fill="#ffffff" rx="8"/>

  <!-- ═══════════ ENTRY: Sub-phase Complete ═══════════ -->
  <rect x="60" y="30" width="280" height="56" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="55" text-anchor="middle" fill="#0969da" font-size="14" font-weight="bold">训练完成</text>
  <text x="200" y="73" text-anchor="middle" fill="#656d76" font-size="11">_handle_overfitting() → status=complete</text>

  <!-- Arrow: Entry → Step 1 -->
  <line x1="200" y1="86" x2="200" y2="120" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════ STEP 1: JIT Export ═══════════ -->
  <rect x="60" y="120" width="280" height="80" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="140" r="11" fill="#0969da"/>
  <text x="80" y="144" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <text x="200" y="145" text-anchor="middle" fill="#0550ae" font-size="13" font-weight="bold">JIT Policy 导出</text>
  <text x="200" y="163" text-anchor="middle" fill="#656d76" font-size="10.5">_export_jit(sp_id, best_ckpt)</text>
  <text x="200" y="180" text-anchor="middle" fill="#8b949e" font-size="10">export_jit.py → policy.pt (~1.1MB)</text>
  <text x="200" y="193" text-anchor="middle" fill="#8b949e" font-size="10">timeout: 120s</text>

  <!-- Arrow: Step 1 → Step 2 -->
  <line x1="200" y1="200" x2="200" y2="230" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="220" fill="#8b949e" font-size="9">jit_path</text>

  <!-- ═══════════ STEP 2: MuJoCo Recording ═══════════ -->
  <rect x="60" y="230" width="280" height="90" rx="8" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="250" r="11" fill="#1a7f37"/>
  <text x="80" y="254" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <text x="200" y="255" text-anchor="middle" fill="#116329" font-size="13" font-weight="bold">MuJoCo Sim2Sim 录制</text>
  <text x="200" y="273" text-anchor="middle" fill="#656d76" font-size="10.5">_record_mujoco_video(sp_id, jit_path)</text>
  <text x="200" y="290" text-anchor="middle" fill="#8b949e" font-size="10">mujoco_manual.py --policy --record</text>
  <text x="200" y="303" text-anchor="middle" fill="#8b949e" font-size="10">EGL offscreen · 500 steps · ~2 min</text>
  <text x="200" y="316" text-anchor="middle" fill="#8b949e" font-size="10">timeout: 300s → {sp_id}_mujoco.mp4</text>

  <!-- Arrow: Step 2 → Step 3 -->
  <line x1="200" y1="320" x2="200" y2="350" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════ STEP 3: Isaac Sim Recording ═══════════ -->
  <rect x="60" y="350" width="280" height="90" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="370" r="11" fill="#8250df"/>
  <text x="80" y="374" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>
  <text x="200" y="375" text-anchor="middle" fill="#6e40c9" font-size="13" font-weight="bold">Isaac Sim 录制</text>
  <text x="200" y="393" text-anchor="middle" fill="#656d76" font-size="10.5">_record_video(sp_id, best_ckpt)</text>
  <text x="200" y="410" text-anchor="middle" fill="#8b949e" font-size="10">play_z1_video.py --checkpoint --headless</text>
  <text x="200" y="423" text-anchor="middle" fill="#8b949e" font-size="10">200 frames · camera tracking · ~15-20 min</text>
  <text x="200" y="436" text-anchor="middle" fill="#cf222e" font-size="10">⚠ 需要先等 Kit 进程退出 (_wait_for_kit_cleanup)</text>

  <!-- Arrow: Step 3 → Step 4 -->
  <line x1="200" y1="440" x2="200" y2="470" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════ STEP 4: Label Videos ═══════════ -->
  <rect x="60" y="470" width="280" height="110" rx="8" fill="#fff8c5" stroke="#9a6700" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="490" r="11" fill="#9a6700"/>
  <text x="80" y="494" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">4</text>
  <text x="200" y="495" text-anchor="middle" fill="#7a5f00" font-size="13" font-weight="bold">视频打标签</text>
  <text x="200" y="513" text-anchor="middle" fill="#656d76" font-size="10.5">_label_videos(sp_id, metrics)</text>
  <text x="200" y="530" text-anchor="middle" fill="#8b949e" font-size="10">label_video.py → 半透明 overlay</text>
  <text x="200" y="546" text-anchor="middle" fill="#8b949e" font-size="10">标签内容: run, model, time_out,</text>
  <text x="200" y="561" text-anchor="middle" fill="#8b949e" font-size="10">bad_ori, vel_err, ep_len, reward, action_rate</text>
  <text x="200" y="576" text-anchor="middle" fill="#8b949e" font-size="10">Isaac + MuJoCo 两个视频都打标签</text>

  <!-- Arrow: Step 4 → Step 5 -->
  <line x1="200" y1="580" x2="200" y2="610" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════ STEP 5: Generate Plots ═══════════ -->
  <rect x="60" y="610" width="280" height="80" rx="8" fill="#ffebe9" stroke="#cf222e" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="80" cy="630" r="11" fill="#cf222e"/>
  <text x="80" y="634" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">5</text>
  <text x="200" y="635" text-anchor="middle" fill="#a40e26" font-size="13" font-weight="bold">生成学习曲线</text>
  <text x="200" y="653" text-anchor="middle" fill="#656d76" font-size="10.5">_generate_plots(sp_id, run_dir)</text>
  <text x="200" y="670" text-anchor="middle" fill="#8b949e" font-size="10">plot_learning_curves.py</text>
  <text x="200" y="685" text-anchor="middle" fill="#8b949e" font-size="10">→ plots/{sp_id}/ · timeout: 120s</text>

  <!-- Arrow: Step 5 → Advance -->
  <line x1="200" y1="690" x2="200" y2="720" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════ EXIT: Advance to Next ═══════════ -->
  <rect x="60" y="720" width="280" height="56" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="745" text-anchor="middle" fill="#0969da" font-size="14" font-weight="bold">进入下一子阶段</text>
  <text x="200" y="763" text-anchor="middle" fill="#656d76" font-size="11">_advance() → status=pending → _start_sub_phase()</text>

  <!-- ═══════════ RIGHT SIDE: Detail Panels ═══════════ -->

  <!-- Panel: _parse_training_metrics -->
  <rect x="440" y="440" width="300" height="150" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="462" text-anchor="middle" fill="#9a6700" font-size="12" font-weight="bold">_parse_training_metrics()</text>
  <text x="455" y="482" fill="#656d76" font-size="10">从训练日志最后 8KB 解析指标:</text>
  <text x="455" y="498" fill="#1a7f37" font-size="10">Episode_Termination/time_out → time_out</text>
  <text x="455" y="514" fill="#1a7f37" font-size="10">Episode_Termination/bad_orientation → bad_ori</text>
  <text x="455" y="530" fill="#1a7f37" font-size="10">Metrics/base_velocity/error_vel_xy → vel_err</text>
  <text x="455" y="546" fill="#1a7f37" font-size="10">Mean episode length → ep_len</text>
  <text x="455" y="562" fill="#1a7f37" font-size="10">Mean reward → reward</text>
  <text x="455" y="578" fill="#1a7f37" font-size="10">Episode_Reward/action_rate_l1 → action_rate</text>

  <!-- Arrow from Step 4 to metrics panel -->
  <line x1="340" y1="520" x2="440" y2="520" stroke="#9a6700" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Panel: _wait_for_kit_cleanup -->
  <rect x="440" y="350" width="300" height="70" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="372" text-anchor="middle" fill="#cf222e" font-size="12" font-weight="bold">_wait_for_kit_cleanup()</text>
  <text x="455" y="392" fill="#656d76" font-size="10">等待 Omniverse Kit 进程完全退出</text>
  <text x="455" y="408" fill="#656d76" font-size="10">避免 KVDB 锁冲突 · timeout: 60s</text>
  <text x="455" y="420" fill="#cf222e" font-size="10">超时则 SIGKILL 强制清理</text>

  <!-- Arrow from Step 3 to kit cleanup panel -->
  <line x1="340" y1="400" x2="440" y2="395" stroke="#8250df" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Panel: Video outputs -->
  <rect x="440" y="230" width="300" height="95" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="252" text-anchor="middle" fill="#1a7f37" font-size="12" font-weight="bold">输出路径 (RTX 服务器)</text>
  <text x="455" y="272" fill="#656d76" font-size="10">videos/phase_pipeline/{sp_id}.mp4</text>
  <text x="455" y="288" fill="#656d76" font-size="10">videos/phase_pipeline/{sp_id}_mujoco.mp4</text>
  <text x="455" y="306" fill="#8b949e" font-size="10">→ 打标签后原地覆盖</text>
  <text x="455" y="320" fill="#8b949e" font-size="10">→ Claude 自动 SCP 下载到本地</text>

  <!-- Arrow from Step 2 to output panel -->
  <line x1="340" y1="280" x2="440" y2="280" stroke="#1a7f37" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Panel: State machine -->
  <rect x="780" y="120" width="280" height="320" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
  <text x="920" y="145" text-anchor="middle" fill="#0969da" font-size="13" font-weight="bold">Orchestrator 主循环状态机</text>

  <!-- State boxes -->
  <rect x="810" y="160" width="80" height="28" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="850" y="178" text-anchor="middle" fill="#656d76" font-size="10">pending</text>

  <rect x="910" y="160" width="80" height="28" rx="6" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="950" y="178" text-anchor="middle" fill="#116329" font-size="10">running</text>

  <rect x="860" y="210" width="100" height="28" rx="6" fill="#fff8c5" stroke="#9a6700"/>
  <text x="910" y="228" text-anchor="middle" fill="#7a5f00" font-size="10">overfitting</text>

  <rect x="810" y="260" width="80" height="28" rx="6" fill="#ddf4ff" stroke="#0969da"/>
  <text x="850" y="278" text-anchor="middle" fill="#0550ae" font-size="10">complete</text>

  <rect x="910" y="260" width="80" height="28" rx="6" fill="#ffebe9" stroke="#cf222e"/>
  <text x="950" y="278" text-anchor="middle" fill="#a40e26" font-size="10">failed</text>

  <!-- State arrows -->
  <line x1="890" y1="174" x2="910" y2="174" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="900" y="168" text-anchor="middle" fill="#8b949e" font-size="8">start</text>

  <line x1="950" y1="188" x2="920" y2="210" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="960" y="202" fill="#8b949e" font-size="8">detect</text>

  <line x1="890" y1="224" x2="860" y2="260" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="855" y="246" fill="#8b949e" font-size="8">handle</text>

  <line x1="840" y1="288" x2="840" y2="310" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="820" y="304" fill="#8b949e" font-size="8">advance</text>

  <!-- advance → post_phase → pending -->
  <rect x="800" y="310" width="240" height="50" rx="6" fill="#fbefff" stroke="#8250df" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="920" y="330" text-anchor="middle" fill="#6e40c9" font-size="10">_run_post_phase_pipeline()</text>
  <text x="920" y="348" text-anchor="middle" fill="#8b949e" font-size="9">JIT → MuJoCo → Isaac → Label → Plots</text>

  <line x1="920" y1="360" x2="920" y2="385" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="860" y="385" width="120" height="28" rx="6" fill="#f6f8fa" stroke="#0969da"/>
  <text x="920" y="403" text-anchor="middle" fill="#0969da" font-size="10">→ next pending</text>

  <!-- Panel: Rollback -->
  <rect x="780" y="470" width="280" height="120" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
  <text x="920" y="492" text-anchor="middle" fill="#cf222e" font-size="12" font-weight="bold">自动回滚机制</text>
  <text x="795" y="512" fill="#656d76" font-size="10">条件: best_reward &lt; starting_reward × 0.95</text>
  <text x="795" y="530" fill="#656d76" font-size="10">→ 丢弃当前结果，从上一 checkpoint 重试</text>
  <text x="795" y="548" fill="#656d76" font-size="10">→ learning_rate × 0.5 (降低学习率)</text>
  <text x="795" y="566" fill="#cf222e" font-size="10">→ 最多回滚 1 次</text>
  <text x="795" y="584" fill="#8b949e" font-size="10">回滚失败 → rollback_exhausted → 标记 failed</text>

  <!-- Panel: Pipeline curriculum -->
  <rect x="780" y="620" width="280" height="150" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" filter="url(#shadow)"/>
  <text x="920" y="642" text-anchor="middle" fill="#0969da" font-size="12" font-weight="bold">5-Phase 课程顺序</text>

  <rect x="800" y="656" width="240" height="20" rx="4" fill="#ddf4ff" stroke="#0969da" stroke-width="0.8"/>
  <text x="920" y="670" text-anchor="middle" fill="#0550ae" font-size="9">p1_coarse → p1_fine (Flat — Bootstrap)</text>

  <rect x="800" y="682" width="240" height="20" rx="4" fill="#dafbe1" stroke="#1a7f37" stroke-width="0.8"/>
  <text x="920" y="696" text-anchor="middle" fill="#116329" font-size="9">p2_coarse → p2_fine (Flat — Velocity)</text>

  <rect x="800" y="708" width="240" height="20" rx="4" fill="#fff8c5" stroke="#9a6700" stroke-width="0.8"/>
  <text x="920" y="722" text-anchor="middle" fill="#7a5f00" font-size="9">p3_coarse → p3_fine (Gentle Terrain)</text>

  <rect x="800" y="734" width="240" height="20" rx="4" fill="#fbefff" stroke="#8250df" stroke-width="0.8"/>
  <text x="920" y="748" text-anchor="middle" fill="#6e40c9" font-size="9">p4_coarse → p4_fine (Rough Terrain)</text>

  <rect x="800" y="760" width="240" height="20" rx="4" fill="#ffebe9" stroke="#cf222e" stroke-width="0.8"/>
  <text x="920" y="774" text-anchor="middle" fill="#a40e26" font-size="9">p5_coarse → p5_fine (Full Terrain + Polish)</text>

  <!-- ═══════════ BOTTOM: Local download flow ═══════════ -->
  <rect x="60" y="790" width="280" height="24" rx="4" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="200" y="806" text-anchor="middle" fill="#8b949e" font-size="10">Claude /gpu-train --tail 自动检测并 SCP 下载</text>
</svg>

<div class="legend">
  <span><span class="dot" style="background:#0969da"></span> JIT Export</span>
  <span><span class="dot" style="background:#1a7f37"></span> MuJoCo EGL</span>
  <span><span class="dot" style="background:#8250df"></span> Isaac Sim</span>
  <span><span class="dot" style="background:#9a6700"></span> Label</span>
  <span><span class="dot" style="background:#cf222e"></span> Plots</span>
  <span><span class="dot" style="background:#d0d7de; border: 1px dashed #8b949e"></span> 状态转换</span>
</div>

</body>
</html>
